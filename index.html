<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Protected Slope Game</title>
  <style>
    /* Responsive game container wrapper */
    .game-wrapper {
      position: relative; 
      width: 100%; 
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0; 
      overflow: hidden;
      background-color: #000;
    }

    /* Secret iframe container - remains hidden until password matches */
    #game-container {
      display: none;
    }

    /* Style the iframe to fit the responsive container */
    .game-wrapper iframe {
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      border: none;
    }

    /* Stylised password gate screen overlay */
    .password-gate {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #111;
      color: #fff;
      font-family: sans-serif;
      z-index: 10;
    }

    .password-box {
      background: #222;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-width: 90%;
      width: 320px;
    }

    .password-box input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #fff;
      box-sizing: border-box;
      font-size: 16px;
    }

    .password-box button {
      background: #00ca51;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    .password-box button:hover {
      background: #00a140;
    }

    .error-msg {
      color: #ff4a4a;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Responsive Parent Wrapper -->
  <div class="game-wrapper">

    <!-- Screen 1: The Password Gate Box -->
    <div id="auth-gate" class="password-gate">
      <div class="password-box">
        <h3>Slope Game Access</h3>
        <p style="color: #aaa; font-size: 14px;">Enter the password to play</p>
        <input type="password" id="pass-input" placeholder="Password">
        <button onclick="verifyPassword()">Unlock & Play</button>
        <div id="error-message" class="error-msg">Incorrect password. Try again!</div>
      </div>
    </div>

    <!-- Screen 2: The Embedded Game (Hidden Initially) -->
    <div id="game-container">
      <iframe 
        src="https://github.io" 
        title="Slope Game" 
        allowfullscreen>
      </iframe>
    </div>

  </div>

  <script>
    function verifyPassword() {
      const userInput = document.getElementById('pass-input').value;
      const errorMessage = document.getElementById('error-message');
      
      // Define your password here
      const secretPassword = "play123"; 

      if (userInput === secretPassword) {
        // Hide password prompt screen
        document.getElementById('auth-gate').style.display = 'none';
        // Reveal and load the iframe
        document.getElementById('game-container').style.display = 'block';
      } else {
        // Show error notification
        errorMessage.style.display = 'block';
        document.getElementById('pass-input').value = '';
      }
    }

    // Allow user to press 'Enter' inside the text field to submit
    document.getElementById('pass-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        verifyPassword();
      }
    });
  </script>

</body>
</html>
