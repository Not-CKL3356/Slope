<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Game Portal Screen</title>
  <style>
    /* Force full viewport coverage without scrollbars */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    /* Outer wrapper filling screen canvas */
    .game-wrapper {
      position: relative; 
      width: 100vw; 
      height: 100vh;
      overflow: hidden;
    }

    /* Initially hidden game iframe block */
    #game-container {
      display: none;
      width: 100%;
      height: 100%;
    }

    /* Stretches the loaded iframe to browser borders */
    .game-wrapper iframe {
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      border: none;
    }

    /* Floating Exit/Logout Button Styling */
    .logout-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 20; /* Ensures it stays on top of the iframe content */
      background: rgba(255, 74, 74, 0.85);
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-family: sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: background 0.2s, transform 0.1s;
    }

    .logout-btn:hover {
      background: rgb(255, 40, 40);
      transform: scale(1.05);
    }

    .logout-btn:active {
      transform: scale(0.95);
    }

    /* Login wall interface overlay */
    .password-gate {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #111;
      color: #fff;
      font-family: sans-serif;
      z-index: 10;
    }

    .password-box {
      background: #222;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-width: 90%;
      width: 320px;
    }

    .password-box input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #fff;
      box-sizing: border-box;
      font-size: 16px;
    }

    .password-box button {
      background: #00ca51;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    .password-box button:hover {
      background: #00a140;
    }

    .error-msg {
      color: #ff4a4a;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="game-wrapper">

    <!-- Universal Login Gate -->
    <div id="auth-gate" class="password-gate">
      <div class="password-box">
        <h3>Arcade Vault Access</h3>
        <p style="color: #aaa; font-size: 14px;">Enter a secret password to unlock a game</p>
        <input type="password" id="pass-input" placeholder="Enter Game Secret Password...">
        <button onclick="verifyPassword()">Unlock & Play</button>
        <div id="error-message" class="error-msg">Unknown password phrase. Try again!</div>
      </div>
    </div>

    <!-- Hidden Game Player Window -->
    <div id="game-container">
      <!-- Floating Logout Action Trigger -->
      <button class="logout-btn" onclick="logoutGame()">❌ Exit Game</button>
      
      <iframe 
        id="game-frame"
        src="" 
        title="Game Player" 
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
      </iframe>
    </div>

  </div>

  <script>
    // Configuration dictionary pairing keys with their respective iframe assets
    const gameDatabase = {
      "slope": "https://ubggo.github.io/ub-games/slope/",
      "dawn": "https://bchs-html-games.github.io/10-Minutes-Till-Dawn/",
      "slope2": "https://not-ckl3356.github.io/Slope-2/"
    };

    function verifyPassword() {
      const userInput = document.getElementById('pass-input').value.trim();
      const errorMessage = document.getElementById('error-message');
      const gameFrame = document.getElementById('game-frame');

      // Check if the input key exists in the database
      if (gameDatabase.hasOwnProperty(userInput)) {
        // Feed the specific game source URL into the empty iframe
        gameFrame.src = gameDatabase[userInput];
        
        // Hide password barrier and display the target game frame
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        errorMessage.style.display = 'none'; // Clear error on successful login
      } else {
        // Display error message for incorrect codes
        errorMessage.style.display = 'block';
        document.getElementById('pass-input').value = '';
      }
    }

    function logoutGame() {
      const gameFrame = document.getElementById('game-frame');
      
      // 1. Completely blank out the iframe URL to cut audio and stop game loops
      gameFrame.src = "";
      
      // 2. Clear the password text field
      document.getElementById('pass-input').value = '';
      
      // 3. Swap layout panels back to default state
      document.getElementById('game-container').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'flex';
    }

    // Capture the 'Enter' key inside the input block
    document.getElementById('pass-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        verifyPassword();
      }
    });
  </script>

</body>
</html>
